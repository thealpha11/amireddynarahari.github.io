<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Modern software developer CV and portfolio website for frontend, full stack, and software engineering roles."
    />
    <meta
      name="keywords"
      content="software developer, frontend developer, full stack developer, React, JavaScript, portfolio, CV, resume"
    />
    <meta name="author" content="Alex Morgan" />
    <meta name="theme-color" content="#0f766e" />
    <meta property="og:title" content="Alex Morgan | Software Developer Portfolio" />
    <meta
      property="og:description"
      content="Professional CV and portfolio for a frontend and full stack software developer."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/developer-avatar.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      const storedTheme = localStorage.getItem("theme");
      const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.dataset.theme = storedTheme || preferredTheme;
    </script>
    <title>Alex Morgan | Software Developer Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
